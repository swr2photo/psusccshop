name: PSUSCCShop
options:
  bundleIdPrefix: com.psusccshop
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: PSUSCCShop/Info.plist
    CODE_SIGN_ENTITLEMENTS: PSUSCCShop/PSUSCCShop.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.psusccshop.ios
    SWIFT_STRICT_CONCURRENCY: targeted
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  PSUSCCShop:
    type: application
    platform: iOS
    sources:
      - path: PSUSCCShop
        excludes:
          - "Resources/Assets.xcassets"
          - "Resources/Localizable.xcstrings"
          - "Info.plist"
          - "PSUSCCShop.entitlements"
    resources:
      - path: PSUSCCShop/Resources/Assets.xcassets
      - path: PSUSCCShop/Resources/Localizable.xcstrings
    settings:
      base:
        INFOPLIST_FILE: PSUSCCShop/Info.plist
        CODE_SIGN_ENTITLEMENTS: PSUSCCShop/PSUSCCShop.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.psusccshop.ios
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    entitlements:
      path: PSUSCCShop/PSUSCCShop.entitlements
