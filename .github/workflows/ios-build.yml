name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
  workflow_dispatch:

env:
  SCHEME: PSUSCCShop
  DESTINATION: 'platform=iOS Simulator,name=iPhone 16 Pro,OS=26.0'

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(find /Applications -maxdepth 1 -name "Xcode*.app" | sort -V | tail -1)
          echo "Using Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ios
        run: |
          xcodegen generate
          echo "✅ Project generated successfully"
          ls -la PSUSCCShop.xcodeproj/

      - name: Show available simulators
        run: |
          xcrun simctl list devices available | grep -i iphone | head -20

      - name: Build for Simulator
        working-directory: ios
        run: |
          set -o pipefail

          # Try default destination first
          if xcodebuild -project PSUSCCShop.xcodeproj \
               -scheme "${{ env.SCHEME }}" \
               -destination "${{ env.DESTINATION }}" \
               -configuration Debug \
               CODE_SIGNING_ALLOWED=NO \
               build 2>&1 | xcpretty; then
            echo "✅ Build succeeded"
          else
            echo "⚠️ Default destination failed, finding available simulator..."
            SIMULATOR=$(xcrun simctl list devices available -j | \
              python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(f\"platform=iOS Simulator,id={d['udid']}\")
                          sys.exit(0)
          " || echo "")

            if [ -n "$SIMULATOR" ]; then
              echo "Using simulator: $SIMULATOR"
              xcodebuild -project PSUSCCShop.xcodeproj \
                -scheme "${{ env.SCHEME }}" \
                -destination "$SIMULATOR" \
                -configuration Debug \
                CODE_SIGNING_ALLOWED=NO \
                build 2>&1 | xcpretty
            else
              echo "❌ No iOS simulator found"
              exit 1
            fi
          fi

  archive:
    name: Archive (unsigned)
    runs-on: macos-15
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(find /Applications -maxdepth 1 -name "Xcode*.app" | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ios
        run: xcodegen generate

      - name: Archive
        working-directory: ios
        run: |
          xcodebuild -project PSUSCCShop.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "${{ runner.temp }}/PSUSCCShop.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            archive 2>&1 | xcpretty || {
              echo "⚠️ Archive failed (expected without signing certificates)"
            }

      - name: Upload Build Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PSUSCCShop-build
          path: |
            ${{ runner.temp }}/PSUSCCShop.xcarchive
          if-no-files-found: warn
          retention-days: 14
