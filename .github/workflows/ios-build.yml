name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
  workflow_dispatch:

env:
  SCHEME: PSUSCCShop
  PROJECT: ios/PSUSCCShop.xcodeproj
  DESTINATION: 'platform=iOS Simulator,name=iPhone 16 Pro,OS=26.0'

jobs:
  build:
    name: Build & Archive
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # List available Xcode versions
          ls /Applications/ | grep Xcode || true
          # Use latest available Xcode
          XCODE_PATH=$(find /Applications -maxdepth 1 -name "Xcode*.app" | sort -V | tail -1)
          echo "Using Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Show available simulators
        run: |
          xcrun simctl list devices available | head -30

      - name: Resolve dependencies
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PSUSCCShop.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            | xcpretty || true

      - name: Build for Simulator
        working-directory: ios
        run: |
          set -o pipefail

          # Find a valid iOS simulator destination
          DEST="${{ env.DESTINATION }}"

          # Fallback: find any available iPhone simulator
          if ! xcodebuild -project PSUSCCShop.xcodeproj \
               -scheme "${{ env.SCHEME }}" \
               -destination "$DEST" \
               -configuration Debug \
               CODE_SIGNING_ALLOWED=NO \
               build 2>/dev/null; then

            echo "⚠️ Default destination failed, finding available simulator..."
            SIMULATOR=$(xcrun simctl list devices available -j | \
              python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(f\"platform=iOS Simulator,id={d['udid']}\")
                          sys.exit(0)
          " || echo "")

            if [ -n "$SIMULATOR" ]; then
              echo "Using simulator: $SIMULATOR"
              xcodebuild -project PSUSCCShop.xcodeproj \
                -scheme "${{ env.SCHEME }}" \
                -destination "$SIMULATOR" \
                -configuration Debug \
                CODE_SIGNING_ALLOWED=NO \
                build | xcpretty
            else
              echo "❌ No iOS simulator found"
              exit 1
            fi
          fi

      - name: Run Tests (if any)
        working-directory: ios
        continue-on-error: true
        run: |
          xcodebuild -project PSUSCCShop.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -destination "${{ env.DESTINATION }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | xcpretty || echo "No tests configured yet"

  archive:
    name: Archive IPA
    runs-on: macos-15
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(find /Applications -maxdepth 1 -name "Xcode*.app" | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Archive (unsigned)
        working-directory: ios
        run: |
          xcodebuild -project PSUSCCShop.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "${{ runner.temp }}/PSUSCCShop.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            archive | xcpretty || {
              echo "⚠️ Archive without signing failed - this is expected without certificates"
              echo "To create a signed IPA, add your certificates and provisioning profiles as GitHub Secrets"
            }

      - name: Export IPA
        if: success()
        run: |
          if [ -d "${{ runner.temp }}/PSUSCCShop.xcarchive" ]; then
            # Create export options
            cat > "${{ runner.temp }}/ExportOptions.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

            xcodebuild -exportArchive \
              -archivePath "${{ runner.temp }}/PSUSCCShop.xcarchive" \
              -exportPath "${{ runner.temp }}/export" \
              -exportOptionsPlist "${{ runner.temp }}/ExportOptions.plist" \
              2>&1 || echo "⚠️ IPA export requires valid signing certificates"
          fi

      - name: Upload Build Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PSUSCCShop-build
          path: |
            ${{ runner.temp }}/PSUSCCShop.xcarchive
            ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn
          retention-days: 14

