name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
  workflow_dispatch:

env:
  SCHEME: PSUSCCShop

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(find /Applications -maxdepth 1 -name "Xcode*.app" | sort -V | tail -1)
          echo "Using Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ios
        run: |
          xcodegen generate
          echo "✅ Project generated successfully"
          ls -la PSUSCCShop.xcodeproj/

      - name: Find Simulator
        id: simulator
        run: |
          # Find any available iPhone simulator
          SIMULATOR=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data.get('devices', {}).items(), reverse=True):
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(f\"platform=iOS Simulator,id={d['udid']}\")
                          sys.exit(0)
          ")
          echo "destination=$SIMULATOR" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $SIMULATOR"

      - name: Build for Simulator
        working-directory: ios
        run: |
          xcodebuild -project PSUSCCShop.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=targeted \
            build 2>&1 | tail -200

  archive:
    name: Archive (unsigned)
    runs-on: macos-15
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(find /Applications -maxdepth 1 -name "Xcode*.app" | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ios
        run: xcodegen generate

      - name: Archive
        working-directory: ios
        run: |
          xcodebuild -project PSUSCCShop.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "${{ runner.temp }}/PSUSCCShop.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SWIFT_STRICT_CONCURRENCY=targeted \
            archive 2>&1 | tail -200 || {
              echo "⚠️ Archive failed (expected without signing certificates)"
            }

      - name: Upload Build Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PSUSCCShop-build
          path: |
            ${{ runner.temp }}/PSUSCCShop.xcarchive
          if-no-files-found: warn
          retention-days: 14
