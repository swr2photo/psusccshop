<!DOCTYPE html>
<html lang="th" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#060914" />
<title>SCC Shop — ออฟไลน์</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #060914;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 360px;
    width: 100%;
  }
  .icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(6,182,212,0.2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  h1 {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #f1f5f9;
  }
  p {
    font-size: 0.9rem;
    color: #94a3b8;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  button {
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.2s;
  }
  button:active { filter: brightness(0.85); }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>ไม่มีการเชื่อมต่ออินเทอร์เน็ต</h1>
  <p>กรุณาตรวจสอบการเชื่อมต่อ Wi-Fi หรือเครือข่ายมือถือ แล้วลองอีกครั้ง</p>
  <button onclick="location.reload()">ลองอีกครั้ง</button>
</div>
</body>
</html>
